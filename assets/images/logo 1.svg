<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 96" role="img" aria-label="KCE Dynamics Limited">
  <!--
    KCE Dynamics Limited — Horizontal Logo
    Black elements on transparent background.
    CSS filter: brightness(0) invert(1) renders this white on dark nav/footer.
  -->

  <!-- ═══════════ ICON MARK ═══════════ -->
  <!-- Scaled from the 108×86 original mark proportions -->

  <!-- K: vertical stem (thick pillar) -->
  <rect x="2" y="9" width="15" height="78" fill="black"/>

  <!-- K: upper arm — filled right-triangle (upper-left / top / centre-left) -->
  <polygon points="17,9 46,9 17,44" fill="black"/>

  <!-- K: lower arm — filled triangle (centre-left / lower-right / bottom-left) -->
  <polygon points="17,48 46,87 17,87" fill="black"/>

  <!-- Scaffolding: two near-horizontal beams extending upper-right from K -->
  <line x1="32" y1="3"  x2="93" y2="20" stroke="black" stroke-width="5.5" stroke-linecap="square"/>
  <line x1="32" y1="17" x2="93" y2="34" stroke="black" stroke-width="5.5" stroke-linecap="square"/>

  <!-- Scaffolding: two vertical poles hanging below the beams -->
  <line x1="71" y1="25" x2="71" y2="90" stroke="black" stroke-width="5.5" stroke-linecap="square"/>
  <line x1="84" y1="28" x2="84" y2="90" stroke="black" stroke-width="5.5" stroke-linecap="square"/>

  <!-- ═══════════ COMPANY NAME ═══════════ -->
  <text
    x="108" y="46"
    font-family="'Arial Black','Arial Narrow Bold','Arial',Helvetica,sans-serif"
    font-weight="900"
    font-size="30"
    fill="black"
    letter-spacing="2.5">KCE DYNAMICS</text>

  <text
    x="108" y="80"
    font-family="'Arial Black','Arial Narrow Bold','Arial',Helvetica,sans-serif"
    font-weight="900"
    font-size="26"
    fill="black"
    letter-spacing="2">LIMITED</text>
</svg>
