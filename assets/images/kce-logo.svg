<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="none">
  <!-- K - left vertical bar -->
  <rect x="4" y="14" width="24" height="84" fill="currentColor"/>
  <!-- K - upper arm -->
  <polygon points="28,14 28,54 80,14 96,14 44,54 28,54" fill="currentColor"/>
  <!-- K - lower arm -->
  <polygon points="28,58 44,58 96,98 80,98 28,98 28,58" fill="currentColor"/>

  <!-- Diagonal crane beam 1 -->
  <line x1="72" y1="10" x2="148" y2="36" stroke="currentColor" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Diagonal crane beam 2 -->
  <line x1="72" y1="24" x2="148" y2="50" stroke="currentColor" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Vertical scaffold post 1 -->
  <line x1="128" y1="38" x2="128" y2="100" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <!-- Vertical scaffold post 2 -->
  <line x1="144" y1="44" x2="144" y2="100" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <!-- Base cross-piece -->
  <line x1="126" y1="98" x2="146" y2="98" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>

  <!-- Company name -->
  <text x="4" y="132" font-family="Arial, sans-serif" font-weight="800" font-size="20" letter-spacing="4" fill="currentColor">KCE DYNAMICS</text>
  <text x="4" y="156" font-family="Arial, sans-serif" font-weight="800" font-size="20" letter-spacing="4" fill="currentColor">LIMITED</text>
  <!-- Tagline -->
  <text x="4" y="178" font-family="Arial, sans-serif" font-weight="400" font-size="10" letter-spacing="2.5" fill="currentColor">TODAY'S WORK, TOMORROW'S HERITAGE</text>
</svg>
